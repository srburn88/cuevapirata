
<style>
*{box-sizing:border-box;margin:0;padding:0}

/* ── CANVAS PRINCIPAL ── */
.G{
  font-family:var(--font-sans);
  background:#0e2010;
  border-radius:16px;
  border:2px solid #2a6030;
  position:relative;
  overflow:hidden;
  min-height:560px;
  max-width:620px;
  margin:0 auto;
}

/* ── CANVAS ANIMADO DE FONDO ── */
#bgCanvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;opacity:.55}

.inner{position:relative;z-index:2;padding:1.1rem 1rem 1.2rem}

/* ── INTRO SCREEN ── */
.intro{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;text-align:center;
  min-height:420px;padding:1.5rem 1rem;
}
.intro-skull{font-size:72px;animation:skullFloat 2.5s ease-in-out infinite;display:block;margin-bottom:.6rem;filter:drop-shadow(0 0 18px rgba(80,200,80,.5))}
@keyframes skullFloat{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-12px) rotate(3deg)}}
.intro-title{font-size:28px;font-weight:700;color:#90ffb0;text-shadow:0 0 24px rgba(80,255,100,.4);letter-spacing:.04em;margin-bottom:.2rem}
.intro-sub{font-size:12px;color:#60a870;letter-spacing:.08em;text-transform:uppercase;margin-bottom:1rem}
.intro-phrase{font-size:13px;font-style:italic;color:#b0e8b8;background:rgba(0,0,0,.3);border:1px solid rgba(80,180,80,.25);border-radius:10px;padding:10px 16px;margin-bottom:1.2rem;max-width:340px;line-height:1.6}
.intro-divider{width:60%;height:1px;background:linear-gradient(90deg,transparent,rgba(80,200,80,.4),transparent);margin:.8rem auto}
.name-lbl{font-size:11px;color:#70b878;font-weight:700;text-align:left;margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
.name-inp{width:100%;padding:10px 14px;background:rgba(0,0,0,.35);border:2px solid rgba(80,160,80,.35);border-radius:10px;color:#c8ffc8;font-size:15px;outline:none;font-family:var(--font-sans);text-align:center;transition:border-color .2s}
.name-inp::placeholder{color:rgba(100,180,100,.35);font-size:13px}
.name-inp:focus{border-color:rgba(100,220,100,.6)}
.btn-go{
  width:100%;margin-top:.8rem;padding:13px;
  background:rgba(60,160,60,.2);
  border:2px solid rgba(80,200,80,.5);
  border-radius:10px;color:#90ffb0;font-size:16px;font-weight:700;
  cursor:pointer;transition:all .2s;font-family:var(--font-sans);
  text-shadow:0 0 12px rgba(80,255,80,.4);
  letter-spacing:.03em;
}
.btn-go:hover{background:rgba(60,160,60,.38);box-shadow:0 0 20px rgba(80,200,80,.25);transform:translateY(-1px)}

/* ── HEADER ── */
.hdr{text-align:center;margin-bottom:.7rem;padding-bottom:.7rem;border-bottom:1px solid rgba(80,200,80,.2)}
.hdr-title{font-size:18px;font-weight:700;color:#90ffb0;letter-spacing:.02em}
.hdr-back{font-size:11px;color:#70a870;font-style:italic;margin-top:2px}
.lv-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(0,0,0,.3);border:1px solid rgba(80,200,80,.3);border-radius:20px;padding:3px 12px;font-size:11px;font-weight:700;color:#80e890;margin:5px auto 0}
.lv-xp{height:3px;background:rgba(0,0,0,.4);border-radius:2px;margin:4px 0 0;overflow:hidden}
.lv-fill{height:100%;border-radius:2px;transition:width .6s ease;background:rgba(100,220,100,.6)}

/* ── STATS ── */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:.7rem}
.stat{background:rgba(0,0,0,.3);border:1px solid rgba(80,160,80,.25);border-radius:9px;padding:6px 4px;text-align:center;transition:all .3s}
.stat.pulse-gold{animation:statPulse .5s ease}
@keyframes statPulse{0%,100%{border-color:rgba(80,160,80,.25)}50%{border-color:rgba(255,220,50,.8);background:rgba(255,200,0,.15)}}
.stat-lbl{font-size:9px;color:#507858;text-transform:uppercase;letter-spacing:.06em;font-weight:700}
.stat-val{font-size:16px;font-weight:700;color:#c8ffc8;margin-top:1px}
.stat-val.d{color:#709870}

/* ── RACHA EN LLAMAS ── */
.streak-bar{display:flex;align-items:center;gap:6px;background:rgba(0,0,0,.25);border:1px solid rgba(80,160,80,.2);border-radius:8px;padding:5px 10px;margin-bottom:.7rem}
.streak-label{font-size:10px;color:#70a870;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.streak-flames{display:flex;gap:2px}
.flame{font-size:14px;opacity:.25;transition:all .3s;filter:grayscale(1)}
.flame.on{opacity:1;filter:none;animation:flameDance .6s ease-in-out infinite alternate}
@keyframes flameDance{0%{transform:scaleY(1) rotate(-3deg)}100%{transform:scaleY(1.15) rotate(3deg)}}
.streak-val{font-size:14px;font-weight:700;color:#ffb040;margin-left:2px}
.gems-pill{margin-left:auto;display:flex;align-items:center;gap:4px;background:rgba(150,80,255,.18);border:1px solid rgba(150,80,255,.35);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;color:#d0a0ff}

/* ── DANGER ── */
.danger-bar{margin-bottom:.7rem}
.danger-row{display:flex;justify-content:space-between;align-items:center;font-size:11px;font-weight:700;margin-bottom:3px}
.danger-track{height:9px;background:rgba(0,0,0,.4);border-radius:5px;overflow:hidden;border:1px solid rgba(80,160,80,.2);position:relative}
.danger-fill{height:100%;border-radius:5px;transition:width .6s ease,background .6s;position:relative}
.danger-fill::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.2),transparent);animation:shimmer 1.8s linear infinite}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}

/* ── MSG ── */
.msg{min-height:46px;border-radius:9px;padding:9px 14px;margin-bottom:.7rem;text-align:center;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.3);border:1px solid rgba(80,160,80,.25);color:#b0ffb8;transition:all .35s;line-height:1.4}
.msg.win{background:rgba(0,60,0,.4);border-color:rgba(80,220,80,.5);color:#c0ffc0}
.msg.lose{background:rgba(100,0,0,.5);border-color:rgba(255,60,60,.5);color:#ffc0c0;animation:msgShake .4s ease}
.msg.esc{background:rgba(0,30,100,.4);border-color:rgba(60,140,255,.4);color:#b0d8ff}
.msg.spc{background:rgba(80,50,0,.4);border-color:rgba(255,180,0,.4);color:#ffe090}
@keyframes msgShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}

/* ── PODERES ── */
.powers{display:flex;gap:5px;margin-bottom:.7rem}
.pow{flex:1;padding:6px 4px;background:rgba(0,0,0,.28);border:1px solid rgba(80,160,80,.22);border-radius:9px;color:#b0ffb0;font-size:10px;font-weight:700;cursor:pointer;transition:all .2s;font-family:var(--font-sans);text-align:center;position:relative}
.pow:hover:not(:disabled){background:rgba(80,180,80,.18);border-color:rgba(100,220,100,.5);transform:translateY(-2px)}
.pow:disabled{opacity:.3;cursor:not-allowed}
.pow .pi{font-size:16px;display:block;margin-bottom:1px}
.pow .pc{font-size:8px;color:#507858;margin-top:1px}
.pow-uses{position:absolute;top:3px;left:5px;background:rgba(0,0,0,.5);border-radius:4px;padding:1px 4px;font-size:8px;color:#80ff90;font-weight:700}
.ftag{position:absolute;top:3px;right:4px;background:rgba(80,200,80,.18);border:1px solid rgba(80,200,80,.35);border-radius:3px;padding:1px 3px;font-size:7px;font-weight:700;color:#80ffb0}

/* ── COFRES ── */
.chests-lbl{font-size:10px;color:#507858;font-weight:700;text-align:center;margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em}
.chests-grid{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;margin-bottom:.7rem}

.chest{
  width:90px;height:84px;border-radius:14px;
  border:2px solid rgba(80,160,80,.3);
  background:rgba(0,0,0,.35);
  cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  position:relative;
  transition:transform .12s,border-color .2s,box-shadow .2s;
  overflow:hidden;
}
.chest::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 50% 0%,rgba(80,200,80,.08),transparent 70%);
  pointer-events:none;
}
.chest:hover:not(.opened):not(.disabled){
  transform:translateY(-7px) scale(1.05);
  border-color:rgba(100,220,100,.7);
  box-shadow:0 10px 28px rgba(0,0,0,.4),0 0 0 1px rgba(100,220,100,.2),0 0 20px rgba(80,200,80,.15);
}
.chest:active:not(.opened):not(.disabled){transform:scale(.93)}
.chest.opened{cursor:default;background:rgba(0,0,0,.5);border-color:rgba(80,160,80,.12)}
.chest.disabled{cursor:not-allowed;opacity:.25;pointer-events:none}
.chest.legendary{border-color:rgba(255,200,0,.7);background:rgba(60,40,0,.5);box-shadow:0 0 0 2px rgba(255,200,0,.3),0 0 18px rgba(255,180,0,.2)}
.chest.cursed{border-color:rgba(180,60,255,.6);background:rgba(60,0,100,.4);box-shadow:0 0 0 2px rgba(180,60,255,.25),0 0 14px rgba(160,50,240,.18)}
.chest.trap-reveal{border-color:rgba(255,50,50,.6);box-shadow:0 0 14px rgba(255,0,0,.3)}
.chest.xhint{box-shadow:0 0 0 3px rgba(80,200,255,.6),0 0 20px rgba(80,200,255,.3)!important}
.chest-icon{font-size:28px;line-height:1;transition:transform .25s}
.chest:hover:not(.opened):not(.disabled) .chest-icon{transform:scale(1.18) translateY(-2px)}
.chest-type{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:#507858}
.chest.legendary .chest-type{color:#c8a020}
.chest.cursed .chest-type{color:#b060e0}
.chest-reward{font-size:12px;font-weight:700;min-height:14px;transition:all .3s}
.cbadge{position:absolute;top:4px;right:4px;font-size:7px;font-weight:700;padding:2px 4px;border-radius:4px;border:1px solid}
.bl{background:rgba(255,200,0,.2);color:#ffe060;border-color:rgba(255,200,0,.5)}
.bc{background:rgba(180,60,255,.2);color:#e090ff;border-color:rgba(180,60,255,.4)}
.bb{background:rgba(60,140,255,.2);color:#90c8ff;border-color:rgba(60,140,255,.4)}
.safe-mark{position:absolute;bottom:3px;left:4px;font-size:10px}

/* ── TENSION METER ── */
.tension{margin-bottom:.7rem}
.tension-row{display:flex;justify-content:space-between;align-items:center;font-size:10px;font-weight:700;color:#507858;margin-bottom:3px}
.tension-track{height:6px;background:rgba(0,0,0,.4);border-radius:3px;overflow:hidden}
.tension-fill{height:100%;border-radius:3px;background:rgba(80,200,80,.5);transition:width .3s,background .3s}

/* ── ACTIONS ── */
.actions{display:flex;gap:5px;justify-content:center;margin-bottom:.5rem;flex-wrap:wrap}
.btn{padding:7px 12px;border-radius:9px;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;background:rgba(0,0,0,.3);color:#b0ffb0;border:1px solid rgba(80,160,80,.3);font-family:var(--font-sans)}
.btn:hover:not(:disabled){background:rgba(80,160,80,.2);border-color:rgba(100,220,100,.5);transform:translateY(-1px)}
.btn:active:not(:disabled){transform:scale(.96)}
.btn.prim{border-color:rgba(100,220,100,.5);color:#90ffb0}
.btn:disabled{opacity:.2;cursor:not-allowed}

/* ── LEGEND ── */
.legend{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:.2rem 0 .5rem}
.li{display:flex;align-items:center;gap:3px;font-size:9px;color:#507858;font-weight:700}
.ld{width:6px;height:6px;border-radius:50%}
.div{width:100%;height:1px;background:rgba(80,160,80,.18);margin:.5rem 0}
.hist-row{display:flex;align-items:center;gap:6px}
.hist-lbl{font-size:9px;color:#507858;font-weight:700;white-space:nowrap;text-transform:uppercase;letter-spacing:.04em}
.hdots{display:flex;gap:3px;flex-wrap:wrap}
.dot{width:7px;height:7px;border-radius:50%}
.dot.w{background:#40c050}.dot.l{background:#d04040}.dot.e{background:#4080d0}

/* ── OVERLAY ── */
.ov{position:absolute;inset:0;background:rgba(5,20,8,.97);z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:1rem;overflow-y:auto;border-radius:16px;opacity:0;pointer-events:none;transition:opacity .4s}
.ov.show{opacity:1;pointer-events:all}
.ov-trophy{font-size:52px;margin-bottom:.3rem;animation:tPop .6s ease forwards;display:block;text-align:center}
@keyframes tPop{0%{transform:scale(0) rotate(-20deg)}70%{transform:scale(1.15) rotate(4deg)}100%{transform:scale(1) rotate(0)}}
.ov-title{font-size:20px;font-weight:700;color:#90ffb0;text-align:center;margin-bottom:2px}
.ov-sub{font-size:11px;color:#60a870;text-align:center;margin-bottom:.6rem;font-style:italic}
.ov-score{font-size:32px;font-weight:700;color:#90ffb0;text-align:center;margin-bottom:.2rem}
.ov-label{font-size:11px;color:#60a870;text-align:center;margin-bottom:.6rem;font-style:italic}
.ov-badges{display:flex;gap:5px;justify-content:center;flex-wrap:wrap;margin-bottom:.7rem}
.obadge{padding:4px 10px;border-radius:20px;font-size:10px;font-weight:700;border:1px solid rgba(100,220,100,.3);background:rgba(100,220,100,.1);color:#b0ffb0}

.tabs{display:flex;background:rgba(0,0,0,.35);border-radius:9px;overflow:hidden;margin-bottom:.7rem;width:100%;max-width:400px}
.tab{flex:1;padding:7px 4px;font-size:10px;font-weight:700;cursor:pointer;background:transparent;border:none;color:#507858;font-family:var(--font-sans);transition:all .2s}
.tab.on{background:rgba(80,200,80,.18);color:#90ffb0}

.panel{width:100%;max-width:400px}
.ph-empty{text-align:center;font-size:12px;color:#507858;padding:.8rem;font-style:italic}
.ph-hdr{display:grid;grid-template-columns:18px 1fr 56px 36px 54px;gap:3px;padding:3px 7px 5px;font-size:8px;color:#507858;text-transform:uppercase;letter-spacing:.05em;font-weight:700}
.ph-row{display:grid;grid-template-columns:18px 1fr 56px 36px 54px;gap:3px;padding:6px 7px;border-radius:7px;background:rgba(80,200,80,.07);border:1px solid rgba(80,160,80,.15);margin-bottom:3px;align-items:center;font-size:10px;color:#b0ffb0}
.ph-row.best{border-color:rgba(255,200,0,.35);background:rgba(80,50,0,.3)}
.ph-gold{font-weight:700;text-align:right}
.ph-chests{text-align:center;color:#70a870}
.ph-tier{font-size:9px;color:#70a870;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ph-date{color:#507858;font-size:9px}

.sg{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:.6rem}
.sc{background:rgba(80,200,80,.08);border:1px solid rgba(80,160,80,.2);border-radius:9px;padding:8px;text-align:center}
.sc-l{font-size:8px;color:#507858;text-transform:uppercase;letter-spacing:.05em;font-weight:700}
.sc-v{font-size:18px;font-weight:700;color:#c8ffc8;margin-top:1px}
.sc-s{font-size:9px;color:#507858;margin-top:1px}
.br{background:rgba(255,200,0,.08);border:1px solid rgba(255,200,0,.2);border-radius:9px;padding:8px 10px;margin-bottom:.6rem}
.br-t{font-size:9px;color:#c8a020;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.br-r{display:flex;justify-content:space-between;font-size:10px;color:#d8ffd0;margin-bottom:2px}
.br-r span:first-child{color:#507858}

.shop-notice{background:rgba(80,200,80,.1);border:1px solid rgba(80,200,80,.25);border-radius:9px;padding:9px 11px;margin-bottom:.7rem;text-align:center}
.sn-t{font-size:12px;font-weight:700;color:#90ffb0;margin-bottom:3px}
.sn-d{font-size:10px;color:#70b878;line-height:1.5}
.sn-f{font-size:9px;color:#507858;margin-top:4px;font-style:italic;border-top:1px solid rgba(80,200,80,.18);padding-top:4px}
.shop-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.si{background:rgba(0,0,0,.28);border:1px solid rgba(80,160,80,.2);border-radius:9px;padding:9px 8px;cursor:pointer;transition:all .2s;position:relative;text-align:left}
.si:hover{background:rgba(80,160,80,.15);border-color:rgba(100,220,100,.4);transform:translateY(-1px)}
.si-i{font-size:20px;margin-bottom:3px}
.si-n{font-size:11px;font-weight:700;color:#c8ffc8;margin-bottom:1px}
.si-d{font-size:9px;color:#507858;line-height:1.4;margin-bottom:5px}
.si-p{font-size:10px;font-weight:700;color:#90ffb0}
.si-f{font-size:8px;color:#507858;font-style:italic;display:block;margin-top:1px}
.sbadge{position:absolute;top:5px;right:5px;font-size:7px;font-weight:700;padding:2px 4px;border-radius:5px}
.sbfree{background:rgba(80,200,80,.2);color:#90ffb0;border:1px solid rgba(80,200,80,.35)}
.sbsoon{background:rgba(200,160,0,.18);color:#ffd060;border:1px solid rgba(200,160,0,.3)}

.ov-actions{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-top:.5rem}
.obtn{padding:7px 16px;background:rgba(80,200,80,.12);border:1px solid rgba(80,200,80,.3);color:#90ffb0;border-radius:9px;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--font-sans);transition:all .2s}
.obtn:hover{background:rgba(80,200,80,.25)}

/* ── MODAL ── */
.modal-wrap{position:absolute;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:center;justify-content:center;border-radius:16px;opacity:0;pointer-events:none;transition:opacity .3s}
.modal-wrap.show{opacity:1;pointer-events:all}
.modal{background:#0e2010;border:2px solid rgba(80,200,80,.35);border-radius:14px;padding:1.2rem;width:88%;max-width:300px;text-align:center}
.modal-i{font-size:36px;margin-bottom:.3rem;display:block}
.modal-t{font-size:15px;font-weight:700;color:#90ffb0;margin-bottom:.3rem}
.modal-d{font-size:11px;color:#80c890;margin-bottom:.5rem;line-height:1.5}
.modal-tn{font-size:10px;color:#90ffb0;background:rgba(80,200,80,.12);border:1px solid rgba(80,200,80,.25);border-radius:7px;padding:5px 9px;margin-bottom:.5rem;line-height:1.5}
.modal-f{font-size:9px;color:#507858;font-style:italic;margin-bottom:.8rem}
.modal-btns{display:flex;gap:7px;justify-content:center}
.mbtn{padding:7px 16px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:2px solid;font-family:var(--font-sans);transition:all .2s}
.mbtn.ok{background:rgba(80,200,80,.2);border-color:rgba(100,220,100,.5);color:#90ffb0}
.mbtn.ok:hover{background:rgba(80,200,80,.38)}
.mbtn.no{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.2);color:#b0d8b0}
.mbtn.no:hover{background:rgba(255,255,255,.15)}

/* ── EFECTO CUEVA TEMBLANDO ── */
@keyframes caveShake{0%,100%{transform:translate(0,0) rotate(0deg)}10%{transform:translate(-3px,-1px) rotate(-.3deg)}20%{transform:translate(3px,1px) rotate(.3deg)}30%{transform:translate(-2px,2px) rotate(-.2deg)}40%{transform:translate(2px,-1px) rotate(.2deg)}50%{transform:translate(-1px,2px) rotate(-.1deg)}60%{transform:translate(1px,-2px) rotate(.1deg)}70%{transform:translate(-2px,1px)}80%{transform:translate(2px,-2px)}90%{transform:translate(-1px,1px)}}
.cave-shake{animation:caveShake .6s ease}

/* ── NÚMERO FLOTANTE ── */
.floatNum{position:absolute;font-size:18px;font-weight:700;pointer-events:none;z-index:60;animation:floatUp2 1.2s ease forwards}
@keyframes floatUp2{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-60px) scale(1.3);opacity:0}}

/* ── PARTÍCULA DE EXPLOSIÓN ── */
.spark{position:absolute;pointer-events:none;z-index:55;border-radius:50%;animation:sparkFly linear forwards}
@keyframes sparkFly{0%{transform:translate(0,0) scale(1);opacity:1}100%{opacity:0}}

/* ── ANIMACIONES COFRE ── */
@keyframes chestBounce{0%,100%{transform:translateY(0)}25%{transform:translateY(-12px) scale(1.08)}60%{transform:translateY(-4px) scale(1.03)}}
@keyframes chestShake{0%,100%{transform:translateX(0) rotate(0)}15%{transform:translateX(-8px) rotate(-2deg)}35%{transform:translateX(8px) rotate(2deg)}55%{transform:translateX(-5px) rotate(-1deg)}75%{transform:translateX(5px) rotate(1deg)}}
@keyframes chestPop{0%{transform:scale(1)}30%{transform:scale(1.25)}60%{transform:scale(.95)}100%{transform:scale(1)}}
.ch-bounce{animation:chestBounce .5s ease}
.ch-shake{animation:chestShake .5s ease}
.ch-pop{animation:chestPop .4s ease}

/* ── LEGENDARY GLOW ── */
@keyframes legGlow{0%,100%{box-shadow:0 0 0 2px rgba(255,200,0,.3),0 0 16px rgba(255,180,0,.15)}50%{box-shadow:0 0 0 3px rgba(255,200,0,.6),0 0 28px rgba(255,180,0,.35)}}
.leg-glow{animation:legGlow 1.5s ease infinite}

/* ── CONFETTI ── */
.cnf{position:absolute;pointer-events:none;z-index:70;font-size:16px;animation:cnfFall linear forwards}
@keyframes cnfFall{0%{transform:translateY(-20px) rotate(0deg);opacity:0}10%{opacity:1}100%{transform:translateY(500px) rotate(540deg);opacity:0}}

/* ── POP MSG ── */
@keyframes popIn{0%{transform:scale(.7);opacity:0}65%{transform:scale(1.06)}100%{transform:scale(1);opacity:1}}
.pop{animation:popIn .3s ease forwards}

/* ── COUNTDOWN RING ── */
.cring-wrap{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:.5rem}
.cring{width:36px;height:36px;position:relative}
.cring svg{transform:rotate(-90deg)}
.cring-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#90ffb0}
</style>

<script>
/* ─── CONSTANTES ─── */
const LEVELS=[{n:"Grumete",x:0},{n:"Marinero",x:3},{n:"Corsario",x:7},{n:"Bucanero",x:13},{n:"Capitán",x:21},{n:"Almirante",x:31},{n:"Leyenda",x:45}];
const TIERS=[{m:0,l:"Polizón",i:"🪝"},{m:100,l:"Grumete",i:"⚓"},{m:300,l:"Corsario",i:"🗡"},{m:600,l:"Capitán",i:"🏴‍☠️"},{m:1e3,l:"Almirante",i:"⚓"},{m:2e3,l:"Leyenda",i:"👑"},{m:4e3,l:"Kraken",i:"🐙"}];
const PHRASES=["«El oro no espera a los cobardes, pero sí a los audaces.»","«Quien no arriesga un mástil, nunca gana un galeón.»","«El mar premia a los valientes y olvida a los prudentes.»","«Abre el primero con calma. El pánico es peor que la trampa.»","«La suerte de los piratas se mide en cofres, no en años.»","«Sólo los necios huyen vacíos... y los listos, justo a tiempo.»"];
const SHOP=[
  {id:"gems100",i:"💎",n:"Pack gemas",d:"Recarga 100 gemas gratis",tn:"Gratis en trial. Futuro: 0,99 €",fu:"Precio previsto: 0,99 €",a:"gems",v:100},
  {id:"vip",i:"👑",n:"VIP Trial",d:"Cofre extra, gemas bonus, poderes VIP",tn:"Gratis en trial. Futuro: 1,99 €/mes",fu:"Precio previsto: 1,99 €/mes",a:"vip"},
  {id:"xray5",i:"🔍",n:"Radar ×5",d:"Revela un cofre seguro",tn:"Gratis en trial. Futuro: 10💎",fu:"Futuro: 10 gemas",a:"pow",p:"xray",u:5},
  {id:"shield3",i:"🛡",n:"Escudo ×3",d:"Sobrevive una trampa mortal",tn:"Gratis en trial. Futuro: 15💎",fu:"Futuro: 15 gemas",a:"pow",p:"shield",u:3},
  {id:"double3",i:"⚡",n:"Doblar ×3",d:"×2 en el próximo cofre",tn:"Gratis en trial. Futuro: 20💎",fu:"Futuro: 20 gemas",a:"pow",p:"double",u:3},
  {id:"safe2",i:"🔒",n:"Seguro ×2",d:"Elimina la trampa de la ronda",tn:"Gratis en trial. Futuro: 25💎",fu:"Futuro: 25 gemas",a:"pow",p:"safe",u:2},
];

/* ─── ESTADO ─── */
function ld(k,d){try{const v=localStorage.getItem("pcu_"+k);return v!=null?JSON.parse(v):d}catch(e){return d}}
function sv(k,v){try{localStorage.setItem("pcu_"+k,JSON.stringify(v))}catch(e){}}

let name=ld("name","Pirata"),oro=0,rec=ld("rec",0),racha=0,cofresN=0,partidas=ld("partidas",[]);
let juegoActivo=false,chestOpened=false,hist=[],lastOro=0,lastCofres=0,lastRes="";
let gems=ld("gems",50),pows=ld("pows",{xray:2,shield:1,double:1,safe:0});
let actPow={dbl:false,shld:false,safe:false,xrayed:false};
let pendModal=null,consecutiveWins=0,totalRounds=ld("totalRounds",0);

/* ─── CANVAS BG (partículas animadas) ─── */
const canvas=document.getElementById("bgCanvas");
const ctx2=canvas.getContext("2d");
let particles=[];

function resizeCanvas(){
  const G=document.getElementById("G");
  canvas.width=G.offsetWidth;canvas.height=G.offsetHeight;
}

function initParticles(){
  particles=[];
  const emojis=["🍀","⭐","🪙","✨","💫"];
  for(let i=0;i<18;i++){
    particles.push({
      x:Math.random()*canvas.width,
      y:Math.random()*canvas.height,
      vy:-(0.15+Math.random()*.3),
      vx:(Math.random()-.5)*.1,
      size:8+Math.random()*8,
      opacity:0.04+Math.random()*.08,
      emoji:emojis[Math.floor(Math.random()*emojis.length)],
      rot:Math.random()*Math.PI*2,
      rotV:(Math.random()-.5)*.02
    });
  }
}

function animateBG(){
  ctx2.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{
    p.y+=p.vy;p.x+=p.vx;p.rot+=p.rotV;
    if(p.y<-20)p.y=canvas.height+10;
    if(p.x<-20)p.x=canvas.width+10;
    if(p.x>canvas.width+20)p.x=-10;
    ctx2.save();
    ctx2.globalAlpha=p.opacity;
    ctx2.font=`${p.size}px serif`;
    ctx2.translate(p.x,p.y);
    ctx2.rotate(p.rot);
    ctx2.fillText(p.emoji,-p.size/2,-p.size/2);
    ctx2.restore();
  });
  requestAnimationFrame(animateBG);
}

setTimeout(()=>{resizeCanvas();initParticles();animateBG()},100);

/* ─── INTRO ─── */
document.getElementById("iphrase").textContent=PHRASES[Math.floor(Math.random()*PHRASES.length)];
if(name!=="Pirata")document.getElementById("nameInp").value=name;
document.getElementById("nameInp").addEventListener("keydown",e=>{if(e.key==="Enter")startGame()});

function startGame(){
  const v=document.getElementById("nameInp").value.trim();
  name=v||"Pirata Anónimo";sv("name",name);
  document.getElementById("intro").style.display="none";
  document.getElementById("gameScreen").style.display="block";
  resizeCanvas();
  const wb=["¡El tesoro te espera, "+name+"!","¡Buena suerte en la cueva, "+name+"!","Que la suerte esté de tu lado, "+name+"...","¡A por el oro, "+name+"!"];
  document.getElementById("hdrBack").textContent=wb[Math.floor(Math.random()*wb.length)];
  reiniciar();
}

/* ─── HELPERS ─── */
function getTier(g){let t=TIERS[0];for(const r of TIERS)if(g>=r.m)t=r;return t}
function getDanger(){return Math.min(.93,.25+cofresN*.03)}
function getCount(){return cofresN<3?4:cofresN<7?5:6}
function getGain(){const b=15+cofresN*7;return Math.floor(Math.random()*b)+b}
function randType(){const r=Math.random();if(r<.07)return"legendary";if(r<.14)return"bonus";if(getDanger()>.4&&r<.21)return"cursed";return"normal"}

/* ─── CONSTRUIR COFRES ─── */
function buildChests(){
  const grid=document.getElementById("chestsGrid"),count=getCount();
  grid.innerHTML="";
  const ti=actPow.safe?-1:Math.floor(Math.random()*count);
  for(let i=0;i<count;i++){
    const isTrap=i===ti,type=isTrap?"normal":randType();
    const div=document.createElement("div");
    div.className="chest"+(type==="legendary"?" legendary leg-glow":type==="cursed"?" cursed":"");
    div.dataset.trap=isTrap?"1":"0";div.dataset.type=type;
    let badge="",icon="🧰",label="Cofre";
    if(type==="legendary"){badge=`<div class="cbadge bl">×2</div>`;icon="🏆";label="Legendario"}
    else if(type==="bonus"){badge=`<div class="cbadge bb">+</div>`;icon="💎";label="Bonus"}
    else if(type==="cursed"){badge=`<div class="cbadge bc">☠</div>`;icon="☠";label="Maldito"}
    div.innerHTML=`${badge}<div class="chest-icon">${icon}</div><div class="chest-type">${label}</div><div class="chest-reward"></div>`;
    div.onclick=()=>abrirCofre(div);
    grid.appendChild(div);
  }
  if(actPow.safe){actPow.safe=false;showMsg("🔒 ¡Trampa eliminada esta ronda!","spc")}
  document.getElementById("chestsLbl").textContent=`Cofre ${cofresN+1} — Elige entre ${count}`;
  updateDanger();updatePowBtns();
}

/* ─── ABRIR COFRE ─── */
function abrirCofre(el){
  if(!juegoActivo||chestOpened)return;
  const isTrap=el.dataset.trap==="1",type=el.dataset.type;
  const all=document.querySelectorAll(".chest");
  chestOpened=true;
  playSound(isTrap&&!actPow.shld?"boom":type==="legendary"?"fanfare":type==="bonus"?"bonus":"coin");

  if(isTrap&&!actPow.shld){
    /* MUERTE */
    el.classList.remove("legendary","leg-glow","cursed");
    el.classList.add("opened","trap-reveal","ch-shake");
    el.querySelector(".chest-icon").textContent="💀";
    el.querySelector(".chest-reward").textContent="¡TRAMPA!";
    el.querySelector(".chest-reward").style.color="#ff8080";
    spawnSparks(el,"#ff4040",14);
    document.getElementById("G").classList.add("cave-shake");
    setTimeout(()=>document.getElementById("G").classList.remove("cave-shake"),650);
    all.forEach(c=>{
      if(c!==el){
        const ct=c.dataset.type;let g=getGain();if(ct==="legendary")g*=2;
        c.classList.remove("legendary","leg-glow","cursed");c.classList.add("opened","disabled");
        c.querySelector(".chest-icon").textContent=ct==="legendary"?"🏆":ct==="bonus"?"💎":"📦";
        c.querySelector(".chest-reward").textContent="+"+g;
        c.querySelector(".chest-reward").style.color="rgba(100,200,100,.3)";
      }
    });
    consecutiveWins=0;oro=0;juegoActivo=false;racha=0;hist.push("l");lastRes="muerte";
    showMsg("💀 ¡La cueva se derrumba, "+name+"! Todo perdido...","lose");
    document.getElementById("btnEsc").disabled=true;
    if(navigator.vibrate)navigator.vibrate([120,60,180]);
    setTimeout(()=>{guardar();showOv("lose")},500);
  } else {
    /* ÉXITO o ESCUDO */
    if(actPow.shld&&isTrap){
      actPow.shld=false;
      el.classList.add("ch-bounce");
      el.querySelector(".chest-icon").textContent="🛡";
      el.querySelector(".chest-reward").textContent="¡Escudo!";
      el.querySelector(".chest-reward").style.color="#80ffff";
      spawnSparks(el,"#00d8ff",8);
      showMsg("🛡 ¡El escudo te salvó! La trampa no hizo efecto.","spc");
      chestOpened=false;all.forEach(c=>c.classList.remove("disabled"));
      setTimeout(()=>{if(juegoActivo){buildChests();chestOpened=false}},950);
      updateAll();return;
    }
    let gain=getGain(),extra="";
    if(actPow.dbl){gain*=2;extra=" ⚡×2";actPow.dbl=false}
    if(type==="legendary"){gain*=2;extra+=" 🏆";el.classList.add("ch-bounce");spawnSparks(el,"#ffd700",12)}
    else if(type==="bonus"){gain+=Math.floor(gain*.5);extra+=" 💎";el.classList.add("ch-bounce");spawnSparks(el,"#60b0ff",8)}
    else if(type==="cursed"){gain=Math.floor(gain*1.8);cofresN+=2;extra+=" ☠";el.classList.add("ch-shake");spawnSparks(el,"#c040ff",8)}
    else{el.classList.add("ch-bounce");spawnSparks(el,"#60d870",6)}

    el.classList.remove("legendary","leg-glow","cursed");el.classList.add("opened");
    el.querySelector(".chest-icon").textContent=type==="legendary"?"🏆":type==="bonus"?"💎":"🪙";
    el.querySelector(".chest-reward").textContent="+"+gain;
    el.querySelector(".chest-reward").style.color="#80ffb0";
    spawnFloatNum(el,"+"+gain);

    if(cofresN>0&&cofresN%5===0){gems+=2;sv("gems",gems);extra+=" 💎+2"}
    oro+=gain;cofresN++;consecutiveWins++;hist.push("w");chestOpened=false;
    document.getElementById("statOro").classList.add("pulse-gold");
    setTimeout(()=>document.getElementById("statOro").classList.remove("pulse-gold"),550);
    showMsg("🪙 +"+gain+" oro!"+extra,"win");
    updateAll();
    setTimeout(()=>{if(juegoActivo){all.forEach(c=>c.classList.remove("disabled"));buildChests();chestOpened=false}},950);
  }
  updateAll();renderHist();
}

/* ─── PARTÍCULAS DE EXPLOSIÓN ─── */
function spawnSparks(el,color,count){
  const rect=el.getBoundingClientRect();
  const gRect=document.getElementById("G").getBoundingClientRect();
  const cx=rect.left-gRect.left+rect.width/2;
  const cy=rect.top-gRect.top+rect.height/2;
  const G=document.getElementById("G");
  for(let i=0;i<count;i++){
    const s=document.createElement("div");
    s.className="spark";
    const angle=(i/count)*Math.PI*2;
    const dist=30+Math.random()*40;
    const dx=Math.cos(angle)*dist,dy=Math.sin(angle)*dist;
    const size=3+Math.random()*4;
    s.style.cssText=`left:${cx}px;top:${cy}px;width:${size}px;height:${size}px;background:${color};animation-duration:${.4+Math.random()*.3}s`;
    s.style.animationName="sparkFly";
    G.appendChild(s);
    s.animate([{transform:"translate(0,0)",opacity:1},{transform:`translate(${dx}px,${dy}px)`,opacity:0}],{duration:400+Math.random()*300,easing:"ease-out",fill:"forwards"}).onfinish=()=>s.remove();
  }
}

/* ─── NÚMERO FLOTANTE ─── */
function spawnFloatNum(el,text){
  const rect=el.getBoundingClientRect();
  const gRect=document.getElementById("G").getBoundingClientRect();
  const G=document.getElementById("G");
  const n=document.createElement("div");
  n.className="floatNum";
  n.textContent=text;
  n.style.cssText=`left:${rect.left-gRect.left+rect.width*.3}px;top:${rect.top-gRect.top}px;color:#80ffb0;text-shadow:0 0 10px rgba(80,255,80,.6)`;
  G.appendChild(n);
  setTimeout(()=>n.remove(),1300);
}

/* ─── CONFETTI INTERNO ─── */
function spawnConfetti(){
  const items=["🍀","✨","🪙","⭐","💫","🌟"];
  const G=document.getElementById("G");
  for(let i=0;i<24;i++){
    const c=document.createElement("div");
    c.className="cnf";c.textContent=items[Math.floor(Math.random()*items.length)];
    c.style.cssText=`left:${Math.random()*100}%;animation-duration:${1.4+Math.random()*1.2}s;animation-delay:${i*.04}s`;
    G.appendChild(c);setTimeout(()=>c.remove(),3200);
  }
}

/* ─── RACHA EN LLAMAS ─── */
function updateStreak(){
  const flames=document.getElementById("streakFlames");
  const val=document.getElementById("streakVal");
  const max=6;
  flames.innerHTML="";
  for(let i=0;i<max;i++){
    const f=document.createElement("span");
    f.className="flame"+(i<consecutiveWins?" on":"");
    f.textContent="🔥";
    flames.appendChild(f);
  }
  val.textContent="×"+consecutiveWins;
  val.style.color=consecutiveWins>=5?"#ff8020":consecutiveWins>=3?"#ffb040":"#808080";
}

/* ─── RACHA RETIRARSE ─── */
function retirarse(){
  if(!juegoActivo)return;
  juegoActivo=false;racha++;totalRounds++;sv("totalRounds",totalRounds);
  lastOro=oro;lastCofres=cofresN;lastRes="escape";
  if(oro>rec){rec=oro;sv("rec",rec)}
  hist.push("e");playSound("escape");
  showMsg("🏃 ¡"+name+" escapa con "+oro.toLocaleString()+" monedas!","esc");
  document.getElementById("btnEsc").disabled=true;
  document.querySelectorAll(".chest").forEach(c=>c.classList.add("disabled"));
  guardar();updateAll();renderHist();
  if(oro>0)setTimeout(()=>{spawnConfetti();showOv("escape")},600);
}

function guardar(){
  const tier=getTier(lastOro||oro);
  const p={gold:lastOro||oro,chests:lastCofres||cofresN,result:lastRes||"muerte",tier:tier.l,icon:tier.i,date:new Date().toLocaleDateString("es-ES",{day:"2-digit",month:"2-digit",year:"2-digit"}),time:new Date().toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit"}),ts:Date.now()};
  partidas.unshift(p);if(partidas.length>60)partidas=partidas.slice(0,60);sv("partidas",partidas);
}

function reiniciar(){
  oro=0;cofresN=0;juegoActivo=true;chestOpened=false;consecutiveWins=0;
  lastOro=0;lastCofres=0;lastRes="";
  actPow={dbl:false,shld:false,safe:false,xrayed:false};
  document.getElementById("btnEsc").disabled=false;
  showMsg("¡A por el tesoro, "+name+"! Elige tu primer cofre...","");
  buildChests();updateAll();closeOv();
}

/* ─── PODERES ─── */
const powCosts={xray:3,shield:5,double:8,safe:10};
function usePow(p){
  if(!juegoActivo)return;
  if(pows[p]<=0){showModalInfo("🛒","Sin usos","Consigue más en la tienda — gratis en trial.",()=>openShop());return}
  if(gems<powCosts[p]){showModalInfo("💎","Gemas insuficientes","Recarga gemas en la tienda. Gratis en trial.",()=>openShop());return}
  gems-=powCosts[p];sv("gems",gems);
  if(p==="xray"){
    if(actPow.xrayed){showMsg("🔍 Radar ya usado en esta ronda","spc");gems+=powCosts[p];sv("gems",gems);return}
    pows.xray--;sv("pows",pows);actPow.xrayed=true;
    const safes=document.querySelectorAll(".chest:not(.opened)[data-trap='0']");
    if(safes.length){const r=safes[Math.floor(Math.random()*safes.length)];r.classList.add("xhint");r.insertAdjacentHTML("beforeend","<div class='safe-mark'>✅</div>");setTimeout(()=>{r.classList.remove("xhint");const s=r.querySelector(".safe-mark");if(s)s.remove()},3500)}
    showMsg("🔍 ¡Radar activo! Cofre seguro marcado 3.5s.","spc");
  } else if(p==="shield"){pows.shield--;sv("pows",pows);actPow.shld=true;showMsg("🛡 ¡Escudo activo! La próxima trampa no te matará.","spc")}
  else if(p==="double"){pows.double--;sv("pows",pows);actPow.dbl=true;showMsg("⚡ ¡Doblar activo! Próximo cofre = ×2 oro.","spc")}
  else if(p==="safe"){pows.safe--;sv("pows",pows);actPow.safe=true;buildChests();return}
  updatePowBtns();updateAll();
}

function updatePowBtns(){
  const costs={xray:3,shield:5,double:8,safe:10};
  [{id:"xray",el:"ux"},{id:"shield",el:"us"},{id:"double",el:"ud"},{id:"safe",el:"uf"}].forEach(({id,el})=>{
    const btn=document.getElementById("pow-"+id);
    document.getElementById(el).textContent=pows[id];
    btn.disabled=!juegoActivo||pows[id]<=0||gems<costs[id];
    btn.style.borderColor=
      (id==="shield"&&actPow.shld)?"rgba(80,200,255,.7)":
      (id==="double"&&actPow.dbl)?"rgba(255,200,0,.7)":"";
  });
}

/* ─── UI HELPERS ─── */
function showMsg(t,type){
  const el=document.getElementById("msg");
  el.textContent=t;el.className="msg pop"+(type?" "+type:"");
}
function updateDanger(){
  const pct=getDanger();
  const fill=document.getElementById("tensionFill"),label=document.getElementById("tensionPct");
  fill.style.width=(pct*100).toFixed(0)+"%";
  const col=pct<.4?"rgba(80,200,80,.55)":pct<.65?"rgba(220,150,0,.65)":"rgba(220,40,40,.7)";
  fill.style.background=col;
  label.style.color=pct<.4?"#80ff90":pct<.65?"#ffe090":"#ff8080";
  label.textContent=(pct*100).toFixed(0)+"%";
  document.getElementById("tensionLabel").textContent=pct<.4?"⚠ Peligro":pct<.65?"⚠⚠ Peligro alto":"💀 PELIGRO MÁXIMO";
}
function updateLevel(){
  const xp=cofresN;let lv=0;
  for(let i=LEVELS.length-1;i>=0;i--)if(xp>=LEVELS[i].x){lv=i;break}
  const ld=LEVELS[lv],nx=LEVELS[lv+1];
  document.getElementById("lvBadge").textContent="⚓ Nivel "+(lv+1)+" — "+ld.n;
  const pct=nx?((xp-ld.x)/(nx.x-ld.x))*100:100;
  document.getElementById("lvFill").style.width=Math.min(100,pct).toFixed(0)+"%";
}
function updateAll(){
  document.getElementById("vOro").textContent=oro.toLocaleString();
  document.getElementById("vRecord").textContent=rec.toLocaleString();
  document.getElementById("vCofres").textContent=cofresN;
  document.getElementById("vPartidas").textContent=partidas.length;
  document.getElementById("vGems").textContent=gems;
  updateDanger();updateLevel();updateStreak();updatePowBtns();
}
function renderHist(){
  document.getElementById("hdots").innerHTML=hist.slice(-40).map(h=>`<div class="dot ${h}"></div>`).join("");
}

/* ─── OVERLAY ─── */
function showOv(mode){
  if(mode==="escape"||mode==="lose"){
    const tier=getTier(lastOro),nx=TIERS.find(t=>t.m>lastOro);
    document.getElementById("ovTrophy").textContent=mode==="escape"?tier.i:"💀";
    document.getElementById("ovTitle").textContent=mode==="escape"?tier.l+" "+tier.i:"¡La cueva se derrumbó!";
    document.getElementById("ovSub").textContent=mode==="escape"?(nx?`Siguiente rango: ${nx.l} con ${nx.m} oro`:"¡Rango máximo!"):"Todo el oro perdido...";

    document.getElementById("ovLabel").textContent="monedas de oro";

function verHazanas(){
  document.getElementById("ovTrophy").textContent="📜";
  document.getElementById("ovTitle").textContent="Libro de Hazañas";
  document.getElementById("ovSub").textContent=name+" · "+partidas.length+" expediciones";
  ["ovScore","ovLabel"].forEach(id=>document.getElementById(id).textContent="");
  document.getElementById("ovBadges").innerHTML="";
  switchTab("hist");document.getElementById("ov").classList.add("show");
}
function openShop(){
  document.getElementById("ovTrophy").textContent="🛒";
  document.getElementById("ovTitle").textContent="Tienda del Capitán";
  document.getElementById("ovSub").textContent="Todo gratis durante el trial";
  ["ovScore","ovLabel"].forEach(id=>document.getElementById(id).textContent="");
  document.getElementById("ovBadges").innerHTML="";

}
function closeOv(){document.getElementById("ov").classList.remove("show")}

function switchTab(tab){
  ["hist","stats","shop"].forEach(t=>{
    document.getElementById("t-"+t).className="tab"+(t===tab?" on":"");
    document.getElementById("p-"+t).style.display=t===tab?"block":"none";
  });
  if(tab==="hist")renderHistPanel();
  if(tab==="stats")renderStats();
  if(tab==="shop")renderShop();
}

function renderHistPanel(){
  const p=document.getElementById("p-hist");
  if(!partidas.length){p.innerHTML=`<div class="ph-empty">Aún no hay expediciones registradas</div>`;return}
  const best=Math.max(...partidas.map(x=>x.gold));
  p.innerHTML=`<div class="ph-hdr"><span>#</span><span>Fecha</span><span style="text-align:right">Oro</span><span style="text-align:center">⬛</span><span style="text-align:right">Rango</span></div>`+
  partidas.slice(0,20).map(x=>{
    const isBest=x.gold===best&&x.gold>0;
    return`<div class="ph-row${isBest?" best":""}"><div>${x.result==="escape"?"🏃":"💀"}</div><div class="ph-date">${x.date} ${x.time}</div><div class="ph-gold">${x.gold.toLocaleString()}</div><div class="ph-chests">${x.chests}</div><div class="ph-tier">${x.icon} ${x.tier}</div></div>`;
  }).join("");
}

function renderStats(){
  const p=document.getElementById("p-stats");
  if(!partidas.length){p.innerHTML=`<div class="ph-empty">Completa al menos una expedición</div>`;return}
  const esc=partidas.filter(x=>x.result==="escape");
  const totalGold=esc.reduce((s,x)=>s+x.gold,0);
  const avg=esc.length?Math.round(totalGold/esc.length):0;
  const maxC=Math.max(...partidas.map(x=>x.chests),0);
  const pct=partidas.length?Math.round(esc.length/partidas.length*100):0;
  const best=partidas.reduce((b,x)=>x.gold>b.gold?x:b,partidas[0]);
  p.innerHTML=`<div class="sg">
    <div class="sc"><div class="sc-l">Expediciones</div><div class="sc-v">${partidas.length}</div><div class="sc-s">${esc.length} escapes</div></div>
    <div class="sc"><div class="sc-l">Tasa escape</div><div class="sc-v">${pct}%</div><div class="sc-s">de éxito</div></div>
    <div class="sc"><div class="sc-l">Oro acumulado</div><div class="sc-v">${totalGold.toLocaleString()}</div><div class="sc-s">escapando</div></div>
    <div class="sc"><div class="sc-l">Media escape</div><div class="sc-v">${avg.toLocaleString()}</div><div class="sc-s">por huida</div></div>
    <div class="sc"><div class="sc-l">Récord</div><div class="sc-v">${rec.toLocaleString()}</div><div class="sc-s">mejor botín</div></div>
    <div class="sc"><div class="sc-l">Más cofres</div><div class="sc-v">${maxC}</div><div class="sc-s">en una partida</div></div>
  </div>`+(best&&best.gold>0?`<div class="br"><div class="br-t">⭐ Tu mejor expedición</div>
    <div class="br-r"><span>Oro</span><span>${best.gold.toLocaleString()} monedas</span></div>
    <div class="br-r"><span>Cofres</span><span>${best.chests}</span></div>
    <div class="br-r"><span>Rango</span><span>${best.icon} ${best.tier}</span></div>
    <div class="br-r"><span>Fecha</span><span>${best.date} · ${best.time}</span></div>
    <div class="br-r"><span>Resultado</span><span>${best.result==="escape"?"🏃 Escapaste":"💀 Caíste"}</span></div>
  </div>`:"");
}

function renderShop(){
  const p=document.getElementById("p-shop");
  p.innerHTML=`<div class="shop-notice">
    <div class="sn-t">🎁 Período Trial — Todo gratuito</div>
    <div class="sn-d">Todas las funciones desbloqueadas sin coste. Disfruta el juego completo.</div>
    <div class="sn-f">Cuando el juego crezca, se activarán los precios. Se avisará con antelación.</div>
  </div>
  <div style="display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,.25);border:1px solid rgba(80,160,80,.2);border-radius:8px;padding:6px 10px;margin-bottom:.6rem">
    <div style="font-size:12px;font-weight:700;color:#c8ffc8">💎 ${gems} gemas disponibles</div>
    <div style="font-size:9px;font-weight:700;color:#90ffb0;background:rgba(80,200,80,.15);border:1px solid rgba(80,200,80,.3);border-radius:5px;padding:2px 7px">TRIAL</div>
  </div>
  <div class="shop-grid">${SHOP.map(it=>`<div class="si" onclick="buyItem('${it.id}')">
    <div class="sbadge ${it.a==="vip"?"sbsoon":"sbfree"}">${it.a==="vip"?"🔜":"🎁"}</div>
    <div class="si-i">${it.i}</div>
    <div class="si-n">${it.n}</div>
    <div class="si-d">${it.d}</div>
    <div class="si-p">🎁 Gratis ahora</div>
    <span class="si-f">${it.fu}</span>
  </div>`).join("")}</div>`;
}

function buyItem(id){
  const it=SHOP.find(x=>x.id===id);if(!it)return;
  showModalFull(it.i,"Activar gratis: "+it.n,it.d,()=>{
    if(it.a==="gems"){gems+=it.v;sv("gems",gems)}
    else if(it.a==="pow"){pows[it.p]=(pows[it.p]||0)+it.u;sv("pows",pows)}
    else if(it.a==="vip"){gems+=20;sv("gems",gems)}
    updateAll();updatePowBtns();renderShop();
  },it.tn,it.fu);
}

/* ─── AUDIO ─── */
let aCtx=null;
function getA(){if(!aCtx)aCtx=new(window.AudioContext||window.webkitAudioContext)();return aCtx}
function beep(f,d,t="sine",v=.13,dl=0){
  try{const a=getA(),o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.type=t;o.frequency.setValueAtTime(f,a.currentTime+dl);g.gain.setValueAtTime(v,a.currentTime+dl);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+dl+d);o.start(a.currentTime+dl);o.stop(a.currentTime+dl+d+.05)}catch(e){}
}
function playSound(t){
  if(t==="coin"){beep(520,.07,"sine",.13);beep(680,.1,"sine",.11,.08)}
  else if(t==="fanfare"){beep(523,.09,"sine",.13);beep(659,.09,"sine",.13,.1);beep(784,.12,"sine",.15,.2);beep(1047,.22,"sine",.17,.33)}
  else if(t==="bonus"){beep(440,.06,"sine",.1);beep(554,.06,"sine",.1,.07);beep(659,.11,"sine",.13,.14)}
  else if(t==="boom"){beep(80,.35,"sawtooth",.22);beep(55,.55,"sawtooth",.18,.12);beep(40,.45,"square",.14,.22)}
  else if(t==="escape"){beep(392,.09,"sine",.1);beep(330,.09,"sine",.1,.11);beep(440,.2,"sine",.13,.22)}
}

updateAll();
</script>
